name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # inkex pulls in scour which can fail to build; install runtime deps
          # explicitly and inkex without its build-time-only dependency.
          pip install "lxml<6.0.0" numpy cssselect tinycss2 pytest ruff
          pip install --no-deps inkex

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest
